# /etc/nginx/sites-available/shield-protocol
#
# Production Nginx configuration for Shield Protocol.
#
# Handles:
#   - TLS termination (Let's Encrypt)
#   - Reverse proxy to indexer (port 3001) and relayer (port 3002)
#   - Security headers
#   - Rate limiting
#   - CORS
#
# Setup:
#   sudo cp this file /etc/nginx/sites-available/shield-protocol
#   sudo ln -s /etc/nginx/sites-available/shield-protocol /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d indexer.yourdomain.com -d relayer.yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=indexer_zone:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=relayer_zone:10m rate=10r/m;

# ── Indexer (read-only, public) ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name indexer.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/indexer.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/indexer.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # Required for Barretenberg SharedArrayBuffer
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # CORS for dapp
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Rate limiting
    limit_req zone=indexer_zone burst=20 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

# ── Relayer (write, tx submission) ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name relayer.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/relayer.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayer.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Tighter rate limit — relay endpoints are expensive
    limit_req zone=relayer_zone burst=5 nodelay;
    limit_req_status 429;

    # Block OPTIONS preflight (handled by app)
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Limit request body to 2MB (proofs are ~16KB — this is generous)
    client_max_body_size 2m;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;  # Stellar tx submission can be slow
        proxy_connect_timeout 5s;
    }
}

# ── HTTP → HTTPS redirects ───────────────────────────────────────────────────
server {
    listen 80;
    server_name indexer.yourdomain.com relayer.yourdomain.com;
    return 301 https://$host$request_uri;
}
